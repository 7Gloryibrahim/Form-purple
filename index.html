<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purple Form</title>
    <link rel="stylesheet" href="form.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
   <form id="register" method="GET" >
    <label for="name" >First name</label>
    <input type="text" id="name" placeholder="First name" required>
    &nbsp;
    <label for="sn" > Second name </label>
    <input type="text" id="sn" placeholder="second name" required/>
  <br>
<label for="ls">Last Name</label>
<input id="ls" type="text" placeholder="last name" required>
&nbsp;
<label for="ps">Password</label>
<input id="ps" type="password" autocomplete="current-password" placeholder="password" required/><span id="opened eye"><i class="bi bi-eye-fill"></i></span>
<p id="passwordrequirement"></p>
<br><br>

<label for="dbirth">Date of birth</label>
<input type="date" id="dbirth" required/><br><br>
<label>Gender:</label>
<label for="male" class="male">Male
<input type="radio" id="male" name="gender" required/>
</label>
<label for="female" class="female">Female
<input type="radio" id="female" name="gender" required/>  
</label>


<button class="submit">Submit</button>&nbsp;
<span><button type="reset" class="reset">Reset</button></span>
</form>

<div></div>
<script src="form.js"></script>
</body>
</html>
